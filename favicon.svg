<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- stacked colour layers matching the retro badge box-shadow style -->
  <rect x="4" y="7" width="26" height="21" rx="5" fill="#00A859"/>
  <rect x="3" y="6" width="26" height="21" rx="5" fill="#2A4FE4"/>
  <rect x="2" y="5" width="26" height="21" rx="5" fill="#FF3B2F"/>
  <!-- main dark card -->
  <rect x="1" y="3" width="26" height="21" rx="5" fill="#15130E"/>
  <!-- WCC logotype -->
  <text x="14" y="18.5"
    font-family="'Arial Black',Impact,'Helvetica Neue',sans-serif"
    font-weight="900"
    font-size="10.5"
    fill="white"
    text-anchor="middle"
    letter-spacing="-0.4">WCC</text>
</svg>
